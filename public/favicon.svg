<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F5D4" />
      <stop offset="100%" stop-color="#7B2CBF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer high-tech circular bezel -->
  <circle cx="16" cy="16" r="14.5" fill="#07090C" stroke="#00F5D4" stroke-width="1.5" opacity="0.9"/>
  
  <!-- Subgrid lines for engineering aesthetic -->
  <path d="M16 1.5 V30.5 M1.5 16 H30.5" stroke="#00F5D4" stroke-width="0.5" opacity="0.15"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#00F5D4" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.2"/>
  
  <!-- Stylized Monogram H and Neural Pathway Connections -->
  <path d="M10 9 V23 M22 9 V23 M10 16 H22" stroke="url(#neonGrad)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Glowing central neural core quantum dot -->
  <circle cx="16" cy="16" r="3" fill="#07090C" stroke="#00F5D4" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="1" fill="#00F5D4"/>
</svg>
